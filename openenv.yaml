name: prenatal_health_openenv
version: "3.0.0"
description: >
  MAAS is a multi-turn maternal-health triage environment for OpenEnv Theme 3.1.
  The agent reasons across a three-day prenatal trajectory, receives only
  partial information at first, can gather more evidence with request actions,
  and is scored with deterministic safety-first reward logic plus competition-grade
  synthetic scenario evaluation.

action_space:
  type: text_json
  required_keys:
    - action_type
    - rationale
  fields:
    action_type:
      type: string
      enum:
        - request_bp_recheck
        - request_kick_count
        - advance_day
        - refer_to_phc
        - diagnose
    target:
      type: string
      nullable: true
      enum:
        - preeclampsia
        - gestational_diabetes
        - anemia
        - preterm_risk
        - fetal_distress
        - low_risk
      description: Final diagnosis label when action_type=diagnose, otherwise null.
    urgency:
      type: string
      nullable: true
      enum:
        - monitor_at_home
        - visit_phc_this_week
        - go_to_hospital_today
      description: Final urgency when action_type=diagnose, otherwise null.
    rationale:
      type: string

observation_space:
  type: object
  fields:
    observation:
      type: object
      description: >
        Structured partially observable maternal-health observation for the
        current visible day in the three-day episode.
      required_fields:
        - user_id
        - weeks_pregnant
        - trimester
        - region
        - regional_access_tier
        - risk_flags
        - bp_trend
        - history_flags
        - days_of_data
        - symptom_cluster
        - bp_systolic_latest
        - bp_diastolic_latest
        - composite_risk_score
        - composite_risk_score
    text_observation:
      type: string
      description: >
        LLM-readable summary of the current day, visible vitals, danger flags,
        and any still-hidden information.
    system_prompt:
      type: string
    user_prompt:
      type: string
    response_format:
      type: string
    valid_conditions:
      type: array
      items: { type: string }
    valid_urgencies:
      type: array
      items: { type: string }

