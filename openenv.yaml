name: prenatal_health_openenv
version: "3.0.0"
description: >
  MAAS is a multi-turn maternal-health triage environment for OpenEnv Theme 3.1.
  The agent reasons across a three-day prenatal trajectory, receives only
  partial information at first, can gather more evidence with request actions,
  and is scored with deterministic safety-first reward logic.

action_space:
  type: text_json
  required_keys:
    - action_type
    - rationale
  fields:
    action_type:
      type: string
      enum:
        - request_bp_recheck
        - request_kick_count
        - advance_day
        - refer_to_phc
        - diagnose
    target:
      type: string
      nullable: true
      enum:
        - preeclampsia
        - gestational_diabetes
        - anemia
        - preterm_risk
        - fetal_distress
        - low_risk
      description: Final diagnosis label when action_type=diagnose, otherwise null.
    urgency:
      type: string
      nullable: true
      enum:
        - monitor_at_home
        - visit_phc_this_week
        - go_to_hospital_today
      description: Final urgency when action_type=diagnose, otherwise null.
    rationale:
      type: string

observation_space:
  type: object
  fields:
    observation:
      type: object
      description: >
        Structured partially observable maternal-health observation for the
        current visible day in the three-day episode.
    text_observation:
      type: string
      description: >
        LLM-readable summary of the current day, visible vitals, danger flags,
        and any still-hidden information.
    system_prompt:
      type: string
    user_prompt:
      type: string
    response_format:
      type: string
    valid_conditions:
      type: array
      items: { type: string }
    valid_urgencies:
      type: array
      items: { type: string }

reward:
  description: >
    Reward is calculated inside the multi-turn environment. Information-gathering
    actions have a small cost, intermediate PHC referrals are rewarded only when
    clinically appropriate, and the final diagnosis reward composes condition,
    urgency, safety, efficiency, and over-escalation logic.
  range: [0.0, 1.0]
  notes:
    - request_bp_recheck: -0.05
    - request_kick_count: -0.05
    - advance_day: 0.0
    - refer_to_phc: +0.3 when PHC timing is appropriate, -0.2 when it is too slow
    - Final diagnosis: condition + urgency + safety + efficiency - over-escalation penalty
    - Final reward is normalized to the [0.0, 1.0] range

training:
  baseline_script: train_grpo.py
  notebook: niva_grpo_training.ipynb
  optional_script: train_grpo_multiturn.py
  optional_notebook: niva_grpo_multiturn_training.ipynb
  trainer: Hugging Face TRL GRPO with optional Unsloth acceleration
  loop: >
    OpenEnv reset -> day-specific partially observable prompt -> multi-turn JSON
    action -> environment step -> cumulative trajectory reward -> GRPO update.

endpoints:
  reset:
    method: POST
    path: /reset
    returns: prompt_observation
  step:
    method: POST
    path: /step
    returns: step_result
  state:
    method: GET
    path: /state
    returns: environment_state

runtime:
  language: python
  entrypoint: uvicorn main:app --host 0.0.0.0 --port 7860
  port: 7860
