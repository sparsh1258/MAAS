name: prenatal_health_openenv
version: "2.0.0"
description: >
  Niva maternal triage environment refactored for an LLM agent. The environment
  emits a structured observation plus an LLM-ready prompt, expects a JSON
  diagnosis/urgency action, and scores that action with deterministic safety and
  reward logic built from maternal-health features and latent risk estimation.

action_space:
  type: text_json
  required_keys:
    - condition
    - urgency
    - rationale
  fields:
    condition:
      type: string
      enum:
        - preeclampsia
        - gestational_diabetes
        - anemia
        - preterm_risk
        - fetal_distress
        - low_risk
    urgency:
      type: string
      enum:
        - monitor_at_home
        - visit_phc_this_week
        - go_to_hospital_today
    rationale:
      type: string

observation_space:
  type: object
  fields:
    observation:
      type: object
      description: Structured maternal-health observation from SQLite-backed user/check-in data.
    text_observation:
      type: string
      description: Clean LLM-readable summary of patient profile, latest vitals, and 3-day trends.
    system_prompt:
      type: string
    user_prompt:
      type: string
    response_format:
      type: string
    valid_conditions:
      type: array
      items: { type: string }
    valid_urgencies:
      type: array
      items: { type: string }

reward:
  description: >
    Reward is calculated by xai_reward_model.py. The reward model uses
    featurize(), latent_risk_scores(), infer_reference_condition(), and
    choose_urgency() to derive a reference condition/urgency and strongly
    penalizes dangerous under-escalation.
  range: [-41.0, 20.0]
  notes:
    - Correct condition: +12
    - Wrong condition: -6
    - Correct urgency: +6
    - Over-escalation: -2
    - Under-escalation: at least -12 and up to -25 based on severity
    - Danger-flag under-escalation override: additional -10
    - More recent data: +1 to +2

training:
  baseline_script: train_trl.py
  trainer: HuggingFace TRL PPO
  loop: >
    OpenEnv reset -> prompt observation -> LLM JSON action -> environment step
    -> deterministic reward -> PPO update.

endpoints:
  reset:
    method: POST
    path: /reset
    returns: prompt_observation
  step:
    method: POST
    path: /step
    returns: step_result
  state:
    method: GET
    path: /state
    returns: environment_state

runtime:
  language: python
  entrypoint: uvicorn main:app --host 0.0.0.0 --port 7860
  port: 7860
