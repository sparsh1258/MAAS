evaluation:
  benchmark_method: batch_evaluate
  metrics:
    - mean_reward
    - accuracy
    - safety_rate

environment_stats:
  total_scenarios: 400
  conditions_covered: 6
  difficulty_levels: 4
  regional_variants: 4

latent_risks:
  - postpartum_hemorrhage
  - maternal_infection
  - dehydration
  - intrahepatic_cholestasis
  - placental_abruption
  - maternal_exhaustion
  - nutrition_deficit
  - cholestasis
  - ectopic_residual_risk
  - maternal_sepsis
  - deep_vein_thrombosis
  - peripartum_cardiomyopathy

