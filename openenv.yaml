training:
  baseline_script: train_grpo_multiturn.py
  notebook: niva_grpo_multiturn_training.ipynb
  single_step_baseline_script: train_grpo.py
  single_step_baseline_notebook: niva_grpo_training.ipynb
  trainer: Hugging Face TRL GRPO with optional Unsloth acceleration
  loop: >
    OpenEnv reset -> day-specific partially observable prompt -> multi-turn JSON
    action -> environment step -> cumulative trajectory reward -> GRPO update.

endpoints:
  reset:
    method: POST
    path: /reset
    returns: prompt_observation
  step:
    method: POST
    path: /step
    returns: step_result
  state:
    method: GET
    path: /state
    returns: environment_state
  health:
    method: GET
    path: /health
    returns: service_status

runtime:
  language: python
  entrypoint: uvicorn main:app --host 0.0.0.0 --port 7860
  port: 7860
