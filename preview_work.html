<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Niva - Prenatal Health Monitor</title>
  <style>
    :root {
      --bg: #f7ebfb;
      --bg-2: #f4e6f7;
      --purple: #5b1faa;
      --purple-soft: #b14ac6;
      --pink: #f5b8cf;
      --green: #d6eed0;
      --green-text: #2f6a28;
      --shadow: 0 22px 44px rgba(152, 107, 168, 0.12);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: Georgia, "Times New Roman", serif;
      background:
        radial-gradient(circle at 15% 60%, rgba(255, 208, 223, 0.45), transparent 28%),
        radial-gradient(circle at 85% 58%, rgba(214, 240, 213, 0.22), transparent 24%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 100%);
      color: #4a245e;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 36px 20px;
    }

    .screen {
      width: min(1180px, 100%);
      text-align: center;
    }

    .title {
      font-size: clamp(2.2rem, 4vw, 3.7rem);
      line-height: 1.12;
      color: var(--purple);
      margin-bottom: 22px;
      font-weight: 500;
    }

    .subtitle {
      font-family: Arial, Helvetica, sans-serif;
      font-size: clamp(1.15rem, 2vw, 1.8rem);
      color: #81355f;
      margin-bottom: 44px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(2, minmax(280px, 1fr));
      gap: 42px;
      align-items: stretch;
    }

    .card {
      background: rgba(255, 255, 255, 0.96);
      border-radius: 34px;
      min-height: 260px;
      padding: 36px 28px;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      text-decoration: none;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 28px 50px rgba(152, 107, 168, 0.18);
    }

    .card.patient {
      border: 2px solid var(--pink);
    }

    .card.asha {
      border: 2px solid var(--green);
    }

    .icon-wrap {
      width: 96px;
      height: 96px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon {
      width: 84px;
      height: 84px;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    .patient .icon {
      stroke: var(--purple-soft);
      stroke-width: 2.2;
    }

    .asha .icon {
      stroke: #49a84a;
      stroke-width: 2.2;
    }

    .label {
      font-family: Arial, Helvetica, sans-serif;
      font-weight: 700;
      font-size: clamp(1.4rem, 2vw, 1.8rem);
      line-height: 1.3;
    }

    .patient .label {
      color: var(--purple);
    }

    .asha .label {
      color: var(--green-text);
    }

    @media (max-width: 820px) {
      .cards {
        grid-template-columns: 1fr;
        gap: 22px;
      }

      .card {
        min-height: 220px;
      }
    }
  </style>
</head>
<body>
  <main class="screen">
    <h1 class="title">Niva - Prenatal Health Monitor</h1>
    <p class="subtitle">Who are you?</p>

    <section class="cards">
      <a class="card patient" href="#" onclick="alert('Patient / User flow'); return false;">
        <div class="icon-wrap" aria-hidden="true">
          <svg class="icon" viewBox="0 0 96 96">
            <circle cx="48" cy="18" r="10"></circle>
            <path d="M39 37c4-7 14-7 18 0"></path>
            <path d="M43 31v30"></path>
            <path d="M53 31v30"></path>
            <path d="M35 49c3-7 8-11 13-13"></path>
            <path d="M61 49c-3-7-8-11-13-13"></path>
            <path d="M44 57c-9 2-15 9-15 17 0 8 6 14 15 14h8"></path>
            <path d="M52 55c12 0 21 10 21 22"></path>
            <path d="M49 55c8 4 12 12 12 21"></path>
            <path d="M40 77c7 4 19 3 25-2"></path>
          </svg>
        </div>
        <div class="label">I am a Patient / User</div>
      </a>

      <a class="card asha" href="#" onclick="alert('ASHA Worker flow'); return false;">
        <div class="icon-wrap" aria-hidden="true">
          <svg class="icon" viewBox="0 0 96 96">
            <path d="M32 57c0-10 7-18 16-18s16 8 16 18"></path>
            <path d="M24 55c0-8 5-15 12-18"></path>
            <path d="M72 55c0-8-5-15-12-18"></path>
            <path d="M48 22v18"></path>
            <path d="M39 31h18"></path>
            <path d="M19 57c0 11 9 19 21 19 3 0 6-1 8-2"></path>
            <path d="M77 57c0 11-9 19-21 19-3 0-6-1-8-2"></path>
            <path d="M34 44c-3-6-9-10-16-10"></path>
            <path d="M62 44c3-6 9-10 16-10"></path>
          </svg>
        </div>
        <div class="label">I am an ASHA Worker</div>
      </a>
    </section>
  </main>
</body>
</html>
